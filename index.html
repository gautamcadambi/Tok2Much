<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Transcriber (En/Hi)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-8">

    <div class="max-w-2xl w-full bg-gray-800 p-8 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">Media Transcriber</h1>
        <p class="text-gray-400 mb-6">Supports MP4, MOV, AVI, MP3. Powered by Whisper AI.</p>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">OpenAI API Key:</label>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full p-2 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 outline-none">
            <p class="text-xs text-gray-500 mt-1">Your key is processed locally in the browser and never stored.</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">Select Media File:</label>
            <input type="file" id="mediaFile" accept=".mp3,.mp4,.mpeg,.mpga,.m4a,.wav,.webm,.mov,.avi" 
                class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
        </div>

        <button onclick="startTranscription()" id="btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">
            Transcribe Now
        </button>

        <div id="status" class="mt-4 text-center text-blue-300 hidden italic">Processing... This may take a minute for large files.</div>

        <div class="mt-8">
            <h2 class="text-xl font-semibold mb-2">Transcription:</h2>
            <div id="result" class="w-full min-h-[200px] p-4 bg-gray-900 rounded border border-gray-700 whitespace-pre-wrap text-gray-200">
                Results will appear here...
            </div>
        </div>
    </div>

    <script>
        async function startTranscription() {
            const apiKey = document.getElementById('apiKey').value;
            const fileInput = document.getElementById('mediaFile');
            const status = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('btn');

            if (!apiKey || !fileInput.files[0]) {
                alert("Please provide both an API key and a file.");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("file", file);
            formData.append("model", "whisper-1");
            // Automatically detects English or Hindi
            formData.append("response_format", "text");

            status.classList.remove('hidden');
            btn.disabled = true;
            btn.innerText = "Transcribing...";

            try {
                const response = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: formData
                });

                const data = await response.text();
                
                if (response.ok) {
                    resultDiv.innerText = data;
                } else {
                    resultDiv.innerText = "Error: " + data;
                }
            } catch (error) {
                resultDiv.innerText = "Error: " + error.message;
            } finally {
                status.classList.add('hidden');
                btn.disabled = false;
                btn.innerText = "Transcribe Now";
            }
        }
    </script>
</body>
</html>
