<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tok2Much | Pro Transcriber</title>
  <script src="coi-serviceworker.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #181c24;
      --border: #232830;
      --border-active: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
      --blue: #3b82f6;
      --blue-glow: rgba(59,130,246,0.15);
      --green: #10b981;
      --green-glow: rgba(16,185,129,0.2);
      --red: #ef4444;
      --red-glow: rgba(239,68,68,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrap { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version { color: var(--muted); font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .grid2 { grid-template-columns: 1fr; }
    }

    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .lang-toggle {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .lang-btn {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
    }

    .lang-btn.active {
      background: var(--blue-glow);
      border-color: var(--blue);
      color: var(--blue);
    }

    .drive-btn {
      width: 100%;
      background: #fff;
      color: #1a1a1a;
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .drive-btn.connected {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      background: var(--surface2);
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.dragover {
      border-color: var(--blue);
      background: rgba(59,130,246,0.06);
    }

    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--blue-glow);
      border: 1px solid var(--blue);
      color: var(--blue);
      border-radius: 999px;
      padding: 0.3rem 0.8rem;
      font-size: 0.78rem;
      margin-top: 0.5rem;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .start-btn {
      width: 100%;
      background: linear-gradient(135deg, #059669, #10b981);
      border-radius: 12px;
      padding: 1.1rem;
      color: #fff;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
      margin-top: 0.5rem;
    }

    .start-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #statusBox { display: none; margin-top: 1rem; }

    .status-bar-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 0.3s;
    }

      width: 100%;
      height: 350px;

      border: 1px solid var(--border);
